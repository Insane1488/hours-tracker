<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Облік годин" />
<title>Облік годин</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1120;
    --panel: #121a2c;
    --panel-2: #1a2238;
    --border: #1f2a44;
    --border-hover: #334166;
    --accent: #60a5fa;
    --accent-2: #f59e0b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --danger: #f87171;
    --success: #34d399;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(800px circle at 0% 0%, rgba(96, 165, 250, 0.06), transparent 50%),
      radial-gradient(600px circle at 100% 100%, rgba(245, 158, 11, 0.04), transparent 50%);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 400;
  }

  .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

  h1.title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  h1.title .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent-2);
    box-shadow: 0 0 12px var(--accent-2);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
  }

  input[type="number"], input[type="date"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: border-color 0.15s ease;
  }
  input[type="number"]:focus, input[type="date"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .field-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .chk {
    appearance: none;
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border: 1.5px solid var(--border-hover);
    border-radius: 5px;
    background: var(--bg);
    cursor: pointer;
    position: relative;
    transition: all 0.15s ease;
  }
  .chk:hover { border-color: var(--accent-2); }
  .chk:checked {
    background: var(--accent-2);
    border-color: var(--accent-2);
  }
  .chk:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1a0f00;
    font-weight: 700;
    font-size: 13px;
  }

  th {
    background: transparent;
    font-weight: 500;
    padding: 10px 8px;
    text-align: left;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(96, 165, 250, 0.04); }

  .btn {
    background: var(--accent-2);
    color: #1a0f00;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 14px;
    border: none;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:hover { background: #fbbf24; transform: translateY(-1px); }

  .btn-ghost {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover {
    background: var(--border);
    border-color: var(--border-hover);
    transform: translateY(-1px);
  }

  .btn-red {
    background: rgba(248, 113, 113, 0.1);
    color: var(--danger);
    border: 1px solid rgba(248, 113, 113, 0.25);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-red:hover {
    background: rgba(248, 113, 113, 0.2);
    border-color: var(--danger);
  }

  .photo-thumb {
    width: 42px; height: 42px; object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid var(--accent-2);
    display: block;
    transition: transform 0.15s ease;
  }
  .photo-thumb:hover { transform: scale(1.08); }

  .photo-btn {
    width: 42px; height: 42px;
    background: var(--bg);
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    border: 1.5px dashed var(--border-hover);
    transition: all 0.15s ease;
  }
  .photo-btn:hover {
    border-color: var(--accent-2);
    border-style: solid;
    background: var(--panel-2);
  }

  .picker-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex; align-items: flex-end;
  }
  .picker-sheet {
    background: var(--panel);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 22px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .recent-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .recent-img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s ease;
  }
  .recent-img:hover {
    border-color: var(--accent-2);
    transform: scale(1.03);
  }

  .fullscreen-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(8px);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }

  .stat-block {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .stat-value.accent { color: var(--accent-2); }
  .stat-value.danger { color: var(--danger); }
  .stat-value.big { font-size: 24px; }

  .month-header {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .month-header::before {
    content: '';
    display: inline-block;
    width: 4px; height: 20px;
    background: var(--accent-2);
    border-radius: 2px;
  }

  .summary-card {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%) !important;
  }

  .total-row td {
    border-top: 2px solid var(--border-hover);
    border-bottom: none;
    padding-top: 14px !important;
    font-weight: 700;
  }
  .total-row td:last-child {
    color: var(--accent-2);
    font-size: 16px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const STORAGE_KEY = 'hours_tracker_v1';
const defaultSettings = {
  rate: 28.1,
  room: 200,
  breakfast: 7,
  lunch: 13,
  dinner: 10,
};

function load() {
  try {
    if (typeof localStorage !== 'undefined') {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        return {
          entries: parsed.entries || [],
          settings: { ...defaultSettings, ...(parsed.settings || {}) },
          recentPhotos: parsed.recentPhotos || [],
        };
      }
    }
  } catch(e) {}
  return { entries: [], settings: defaultSettings, recentPhotos: [] };
}

function save(state) {
  try {
    if (typeof localStorage !== 'undefined') {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
  } catch(e) {
    alert('Помилка збереження. Можливо, забагато фотографій в пам\'яті.');
  }
}

// Compress image to JPEG base64, max 700px, quality 0.75
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 700;
        let w = img.width, h = img.height;
        if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Photo picker sheet
function PhotoPicker({ onSelect, onClose, recentPhotos }) {
  const fileRef = useRef();

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const compressed = await compressImage(file);
    onSelect(compressed);
  };

  return (
    <div className="picker-overlay" onClick={onClose}>
      <div className="picker-sheet" onClick={e => e.stopPropagation()}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
          <span style={{fontSize:'16px', fontWeight:600, color:'var(--text)'}}>Фото для дня</span>
          <button onClick={onClose} style={{color:'var(--text-dim)', fontSize:'22px', lineHeight:1, background:'transparent', border:'none', cursor:'pointer'}}>✕</button>
        </div>

        <button className="btn" style={{width:'100%', marginBottom:'20px', padding:'12px'}}
          onClick={() => fileRef.current.click()}>
          Вибрати нову фотографію
        </button>
        <input
          ref={fileRef}
          type="file"
          accept="image/*"
          capture="environment"
          style={{display:'none'}}
          onChange={handleFile}
        />

        {recentPhotos.length > 0 && (
          <>
            <div style={{fontSize:'13px', color:'var(--text-dim)', marginBottom:'10px'}}>
              Останні {recentPhotos.length} фото — натисни щоб вставити:
            </div>
            <div className="recent-grid">
              {recentPhotos.map((src, i) => (
                <img
                  key={i}
                  src={src}
                  className="recent-img"
                  onClick={() => onSelect(src)}
                />
              ))}
            </div>
          </>
        )}
        <div style={{height:'20px'}} />
      </div>
    </div>
  );
}

// Fullscreen image viewer
function FullscreenPhoto({ src, onClose }) {
  return (
    <div className="fullscreen-overlay" onClick={onClose}>
      <img src={src} style={{maxWidth:'95vw', maxHeight:'90vh', borderRadius:'8px', objectFit:'contain'}} />
      <div style={{color:'#94a3b8', marginTop:'16px', fontSize:'14px'}}>Натисни щоб закрити</div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(load);
  const { entries, settings, recentPhotos } = state;
  const [pickerFor, setPickerFor] = useState(null); // entry id
  const [fullscreenImg, setFullscreenImg] = useState(null);

  useEffect(() => { save(state); }, [state]);

  const addEntry = () => {
    const today = new Date().toISOString().slice(0, 10);
    setState(s => ({
      ...s,
      entries: [...s.entries, { id: Date.now(), date: today, hours: 0, b: 0, l: 0, d: 0, img: null }]
    }));
  };

  const updateEntry = (id, field, value) => {
    setState(s => ({
      ...s,
      entries: s.entries.map(e => e.id === id ? { ...e, [field]: value } : e)
    }));
  };

  const deleteEntry = (id) => {
    setState(s => ({ ...s, entries: s.entries.filter(e => e.id !== id) }));
  };

  const updateSetting = (field, value) => {
    setState(s => ({ ...s, settings: { ...s.settings, [field]: value } }));
  };

  const handlePhotoSelect = useCallback((base64) => {
    if (!pickerFor) return;
    setState(s => {
      // Add to recent (no duplicates, max 10)
      const without = s.recentPhotos.filter(p => p !== base64);
      const newRecent = [base64, ...without].slice(0, 10);
      return {
        ...s,
        recentPhotos: newRecent,
        entries: s.entries.map(e => e.id === pickerFor ? { ...e, img: base64 } : e),
      };
    });
    setPickerFor(null);
  }, [pickerFor]);

  const removePhoto = (id) => {
    setState(s => ({
      ...s,
      entries: s.entries.map(e => e.id === id ? { ...e, img: null } : e),
    }));
  };

  const exportData = () => {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `hours-tracker-${today}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importFileRef = useRef();
  const handleImportFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.entries || !Array.isArray(parsed.entries)) {
          alert('Невірний формат файлу.');
          return;
        }
        const mode = confirm(
          `Знайдено ${parsed.entries.length} записів.\n\n` +
          'OK — ЗАМІНИТИ всі поточні дані\n' +
          'Cancel — ОБ\'ЄДНАТИ з поточними (додати нові записи)'
        );
        setState(s => {
          if (mode) {
            return {
              entries: parsed.entries,
              settings: { ...defaultSettings, ...(parsed.settings || s.settings) },
              recentPhotos: parsed.recentPhotos || [],
            };
          } else {
            const existingIds = new Set(s.entries.map(e => e.id));
            const newOnes = parsed.entries.filter(e => !existingIds.has(e.id));
            const mergedPhotos = [...(parsed.recentPhotos || []), ...s.recentPhotos]
              .filter((v, i, a) => a.indexOf(v) === i)
              .slice(0, 10);
            return {
              entries: [...s.entries, ...newOnes],
              settings: s.settings,
              recentPhotos: mergedPhotos,
            };
          }
        });
        alert('Готово!');
      } catch (err) {
        alert('Помилка читання файлу: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Group by month
  const groups = useMemo(() => {
    const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
    const g = {};
    sorted.forEach(e => {
      const key = e.date.slice(0, 7);
      if (!g[key]) g[key] = [];
      g[key].push(e);
    });
    return g;
  }, [entries]);

  const calcMonth = (list) => {
    const hours = list.reduce((a, e) => a + Number(e.hours || 0), 0);
    const meals = list.reduce((a, e) =>
      a + (e.b ? settings.breakfast : 0) + (e.l ? settings.lunch : 0) + (e.d ? settings.dinner : 0), 0);
    const gross = hours * settings.rate;
    const net = gross - settings.room - meals;
    return { hours, meals, gross, net };
  };

  const monthName = (key) => {
    const [y, m] = key.split('-');
    const names = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
    return `${names[parseInt(m)-1]} ${y}`;
  };

  return (
    <div className="max-w-6xl mx-auto p-4 md:p-8">
      <div className="mb-8">
        <h1 className="title"><span className="dot"></span>Облік годин</h1>
        <div className="subtitle">Облік робочих годин та заробітку</div>
      </div>

      {/* Settings */}
      <div className="card mb-6">
        <div className="card-title">Налаштування</div>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
          <label className="flex flex-col">
            <span className="field-label">Ставка zł/год</span>
            <input type="number" step="0.01" value={settings.rate}
              onChange={e => updateSetting('rate', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col">
            <span className="field-label">Кімната</span>
            <input type="number" value={settings.room}
              onChange={e => updateSetting('room', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col">
            <span className="field-label">Сніданок</span>
            <input type="number" value={settings.breakfast}
              onChange={e => updateSetting('breakfast', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col">
            <span className="field-label">Обід</span>
            <input type="number" value={settings.lunch}
              onChange={e => updateSetting('lunch', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col">
            <span className="field-label">Вечеря</span>
            <input type="number" value={settings.dinner}
              onChange={e => updateSetting('dinner', parseFloat(e.target.value) || 0)} />
          </label>
        </div>
      </div>

      <div className="flex flex-wrap gap-2 mb-6">
        <button className="btn" onClick={addEntry}>+ Додати день</button>
        <button className="btn btn-ghost" onClick={exportData}>↓ Експорт</button>
        <button className="btn btn-ghost" onClick={() => importFileRef.current.click()}>↑ Імпорт</button>
        <input
          ref={importFileRef}
          type="file"
          accept="application/json,.json"
          style={{display:'none'}}
          onChange={handleImportFile}
        />
      </div>

      {/* Загальний підсумок */}
      {Object.keys(groups).length > 0 && (
        <div className="card summary-card mb-6">
          <div className="card-title">Підсумок по місяцях</div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr>
                  <th>Місяць</th>
                  <th className="text-right">Годин</th>
                  <th className="text-right">Брутто</th>
                  <th className="text-right">Їжа</th>
                  <th className="text-right">Кімната</th>
                  <th className="text-right">На руки</th>
                </tr>
              </thead>
              <tbody>
                {Object.keys(groups).sort().reverse().map(key => {
                  const m = calcMonth(groups[key]);
                  return (
                    <tr key={key}>
                      <td className="font-semibold">{monthName(key)}</td>
                      <td className="text-right">{m.hours}</td>
                      <td className="text-right">{m.gross.toFixed(2)} zł</td>
                      <td className="text-right text-red-400">−{m.meals.toFixed(2)}</td>
                      <td className="text-right text-red-400">−{settings.room.toFixed(2)}</td>
                      <td className="text-right font-bold text-amber-400">{m.net.toFixed(2)} zł</td>
                    </tr>
                  );
                })}
                {(() => {
                  const all = Object.values(groups).flat();
                  const totalHours = all.reduce((a,e) => a + Number(e.hours||0), 0);
                  const totalMeals = all.reduce((a,e) => a + (e.b?settings.breakfast:0) + (e.l?settings.lunch:0) + (e.d?settings.dinner:0), 0);
                  const monthCount = Object.keys(groups).length;
                  const totalRoom = settings.room * monthCount;
                  const totalGross = totalHours * settings.rate;
                  const totalNet = totalGross - totalMeals - totalRoom;
                  return (
                    <tr className="total-row">
                      <td>Разом</td>
                      <td className="text-right">{totalHours}</td>
                      <td className="text-right">{totalGross.toFixed(2)} zł</td>
                      <td className="text-right" style={{color:'#f87171'}}>−{totalMeals.toFixed(2)}</td>
                      <td className="text-right" style={{color:'#f87171'}}>−{totalRoom.toFixed(2)}</td>
                      <td className="text-right">{totalNet.toFixed(2)} zł</td>
                    </tr>
                  );
                })()}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {Object.keys(groups).length === 0 && (
        <div className="card">
          <div className="empty-state">Ще немає записів. Натисни «Додати день».</div>
        </div>
      )}

      {Object.keys(groups).sort().reverse().map(key => {
        const list = groups[key];
        const { hours, meals, gross, net } = calcMonth(list);
        return (
          <div key={key} className="card mb-6">
            <div className="month-header">{monthName(key)}</div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr>
                    <th>Дата</th>
                    <th>Години</th>
                    <th className="text-center">Сніданок</th>
                    <th className="text-center">Обід</th>
                    <th className="text-center">Вечеря</th>
                    <th className="text-center">Фото</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {list.map(e => (
                    <tr key={e.id}>
                      <td><input type="date" value={e.date}
                        onChange={ev => updateEntry(e.id, 'date', ev.target.value)} /></td>
                      <td><input type="number" step="0.5" min="0" style={{width:'90px'}}
                        value={e.hours === 0 ? '' : e.hours}
                        placeholder="0"
                        onFocus={ev => ev.target.select()}
                        onChange={ev => updateEntry(e.id, 'hours', ev.target.value === '' ? 0 : parseFloat(ev.target.value) || 0)} /></td>
                      <td className="text-center"><input type="checkbox" className="chk" checked={!!e.b}
                        onChange={ev => updateEntry(e.id, 'b', ev.target.checked ? 1 : 0)} /></td>
                      <td className="text-center"><input type="checkbox" className="chk" checked={!!e.l}
                        onChange={ev => updateEntry(e.id, 'l', ev.target.checked ? 1 : 0)} /></td>
                      <td className="text-center"><input type="checkbox" className="chk" checked={!!e.d}
                        onChange={ev => updateEntry(e.id, 'd', ev.target.checked ? 1 : 0)} /></td>
                      <td className="text-center">
                        {e.img ? (
                          <div style={{display:'flex', gap:'4px', alignItems:'center', justifyContent:'center'}}>
                            <img
                              src={e.img}
                              className="photo-thumb"
                              onClick={() => setFullscreenImg(e.img)}
                              title="Натисни щоб переглянути"
                            />
                            <button
                              onClick={() => setPickerFor(e.id)}
                              style={{color:'#94a3b8', fontSize:'11px', cursor:'pointer'}}
                              title="Замінити фото"
                            >↺</button>
                            <button
                              onClick={() => removePhoto(e.id)}
                              style={{color:'#ef4444', fontSize:'11px', cursor:'pointer'}}
                              title="Видалити фото"
                            >✕</button>
                          </div>
                        ) : (
                          <button
                            className="photo-btn"
                            onClick={() => setPickerFor(e.id)}
                            title="Додати фото"
                          >📷</button>
                        )}
                      </td>
                      <td><button className="btn-red" onClick={() => deleteEntry(e.id)}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mt-5">
              <div className="stat-block">
                <div className="stat-label">Годин</div>
                <div className="stat-value">{hours}</div>
              </div>
              <div className="stat-block">
                <div className="stat-label">Брутто</div>
                <div className="stat-value">{gross.toFixed(2)} zł</div>
              </div>
              <div className="stat-block">
                <div className="stat-label">Їжа</div>
                <div className="stat-value danger">−{meals.toFixed(2)}</div>
              </div>
              <div className="stat-block">
                <div className="stat-label">Кімната</div>
                <div className="stat-value danger">−{settings.room.toFixed(2)}</div>
              </div>
              <div className="stat-block">
                <div className="stat-label">На руки</div>
                <div className="stat-value accent big">{net.toFixed(2)} zł</div>
              </div>
            </div>
          </div>
        );
      })}

      {/* Photo picker modal */}
      {pickerFor !== null && (
        <PhotoPicker
          recentPhotos={recentPhotos}
          onSelect={handlePhotoSelect}
          onClose={() => setPickerFor(null)}
        />
      )}

      {/* Fullscreen viewer */}
      {fullscreenImg && (
        <FullscreenPhoto src={fullscreenImg} onClose={() => setFullscreenImg(null)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
