<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Облік годин" />
<title>Облік годин</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
  input[type="number"], input[type="date"] {
    background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
    border-radius: 6px; padding: 6px 10px;
  }
  input[type="number"]:focus, input[type="date"]:focus { outline: none; border-color: #f59e0b; }
  .chk { width: 20px; height: 20px; accent-color: #f59e0b; cursor: pointer; }
  th { background: #1e293b; font-weight: 600; padding: 10px 8px; text-align: left; font-size: 13px; }
  td { padding: 8px; border-bottom: 1px solid #1e293b; font-size: 14px; }
  tr:hover td { background: #1e293b33; }
  .btn { background: #f59e0b; color: #0f172a; font-weight: 600; padding: 8px 16px; border-radius: 6px; }
  .btn:hover { background: #fbbf24; }
  .btn-red { background: #dc2626; color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
  .btn-red:hover { background: #ef4444; }
  .card { background: #1e293b; border-radius: 10px; padding: 20px; }
  .photo-thumb {
    width: 44px; height: 44px; object-fit: cover; border-radius: 6px;
    cursor: pointer; border: 2px solid #f59e0b; display: block;
  }
  .photo-btn {
    width: 44px; height: 44px; background: #334155; border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 20px; border: 2px dashed #475569;
  }
  .photo-btn:hover { border-color: #f59e0b; background: #1e293b; }
  .picker-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: flex; align-items: flex-end;
  }
  .picker-sheet {
    background: #1e293b; border-radius: 16px 16px 0 0;
    padding: 20px; width: 100%; max-height: 85vh; overflow-y: auto;
  }
  .recent-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .recent-img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover;
    border-radius: 8px; cursor: pointer; border: 3px solid transparent;
  }
  .recent-img:hover { border-color: #f59e0b; }
  .fullscreen-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    z-index: 300; display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const STORAGE_KEY = 'hours_tracker_v1';
const defaultSettings = {
  rate: 28.1,
  room: 200,
  breakfast: 7,
  lunch: 13,
  dinner: 10,
};

function load() {
  try {
    if (typeof localStorage !== 'undefined') {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        return {
          entries: parsed.entries || [],
          settings: { ...defaultSettings, ...(parsed.settings || {}) },
          recentPhotos: parsed.recentPhotos || [],
        };
      }
    }
  } catch(e) {}
  return { entries: [], settings: defaultSettings, recentPhotos: [] };
}

function save(state) {
  try {
    if (typeof localStorage !== 'undefined') {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
  } catch(e) {
    alert('Помилка збереження. Можливо, забагато фотографій в пам\'яті.');
  }
}

// Compress image to JPEG base64, max 700px, quality 0.75
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 700;
        let w = img.width, h = img.height;
        if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Photo picker sheet
function PhotoPicker({ onSelect, onClose, recentPhotos }) {
  const fileRef = useRef();

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const compressed = await compressImage(file);
    onSelect(compressed);
  };

  return (
    <div className="picker-overlay" onClick={onClose}>
      <div className="picker-sheet" onClick={e => e.stopPropagation()}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px'}}>
          <span style={{fontWeight:700, fontSize:'18px'}}>📷 Фото для дня</span>
          <button onClick={onClose} style={{color:'#94a3b8', fontSize:'22px', lineHeight:1}}>✕</button>
        </div>

        <button className="btn" style={{width:'100%', marginBottom:'16px', padding:'12px'}}
          onClick={() => fileRef.current.click()}>
          📁 Вибрати нову фотографію
        </button>
        <input
          ref={fileRef}
          type="file"
          accept="image/*"
          capture="environment"
          style={{display:'none'}}
          onChange={handleFile}
        />

        {recentPhotos.length > 0 && (
          <>
            <div style={{color:'#94a3b8', fontSize:'13px', marginBottom:'10px'}}>
              Останні {recentPhotos.length} фото — натисни щоб вставити:
            </div>
            <div className="recent-grid">
              {recentPhotos.map((src, i) => (
                <img
                  key={i}
                  src={src}
                  className="recent-img"
                  onClick={() => onSelect(src)}
                />
              ))}
            </div>
          </>
        )}
        <div style={{height:'20px'}} />
      </div>
    </div>
  );
}

// Fullscreen image viewer
function FullscreenPhoto({ src, onClose }) {
  return (
    <div className="fullscreen-overlay" onClick={onClose}>
      <img src={src} style={{maxWidth:'95vw', maxHeight:'90vh', borderRadius:'8px', objectFit:'contain'}} />
      <div style={{color:'#94a3b8', marginTop:'16px', fontSize:'14px'}}>Натисни щоб закрити</div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(load);
  const { entries, settings, recentPhotos } = state;
  const [pickerFor, setPickerFor] = useState(null); // entry id
  const [fullscreenImg, setFullscreenImg] = useState(null);

  useEffect(() => { save(state); }, [state]);

  const addEntry = () => {
    const today = new Date().toISOString().slice(0, 10);
    setState(s => ({
      ...s,
      entries: [...s.entries, { id: Date.now(), date: today, hours: 0, b: 0, l: 0, d: 0, img: null }]
    }));
  };

  const updateEntry = (id, field, value) => {
    setState(s => ({
      ...s,
      entries: s.entries.map(e => e.id === id ? { ...e, [field]: value } : e)
    }));
  };

  const deleteEntry = (id) => {
    setState(s => ({ ...s, entries: s.entries.filter(e => e.id !== id) }));
  };

  const updateSetting = (field, value) => {
    setState(s => ({ ...s, settings: { ...s.settings, [field]: value } }));
  };

  const handlePhotoSelect = useCallback((base64) => {
    if (!pickerFor) return;
    setState(s => {
      // Add to recent (no duplicates, max 10)
      const without = s.recentPhotos.filter(p => p !== base64);
      const newRecent = [base64, ...without].slice(0, 10);
      return {
        ...s,
        recentPhotos: newRecent,
        entries: s.entries.map(e => e.id === pickerFor ? { ...e, img: base64 } : e),
      };
    });
    setPickerFor(null);
  }, [pickerFor]);

  const removePhoto = (id) => {
    setState(s => ({
      ...s,
      entries: s.entries.map(e => e.id === id ? { ...e, img: null } : e),
    }));
  };

  // Group by month
  const groups = useMemo(() => {
    const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
    const g = {};
    sorted.forEach(e => {
      const key = e.date.slice(0, 7);
      if (!g[key]) g[key] = [];
      g[key].push(e);
    });
    return g;
  }, [entries]);

  const calcMonth = (list) => {
    const hours = list.reduce((a, e) => a + Number(e.hours || 0), 0);
    const meals = list.reduce((a, e) =>
      a + (e.b ? settings.breakfast : 0) + (e.l ? settings.lunch : 0) + (e.d ? settings.dinner : 0), 0);
    const gross = hours * settings.rate;
    const net = gross - settings.room - meals;
    return { hours, meals, gross, net };
  };

  const monthName = (key) => {
    const [y, m] = key.split('-');
    const names = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
    return `${names[parseInt(m)-1]} ${y}`;
  };

  return (
    <div className="max-w-6xl mx-auto p-4 md:p-8">
      <h1 className="text-3xl font-bold mb-6 text-amber-400">⏱ Облік годин</h1>

      {/* Settings */}
      <div className="card mb-6">
        <h2 className="text-lg font-semibold mb-3">Налаштування</h2>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
          <label className="flex flex-col text-sm">
            <span className="text-slate-400 mb-1">Ставка zł/год</span>
            <input type="number" step="0.01" value={settings.rate}
              onChange={e => updateSetting('rate', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col text-sm">
            <span className="text-slate-400 mb-1">Кімната</span>
            <input type="number" value={settings.room}
              onChange={e => updateSetting('room', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col text-sm">
            <span className="text-slate-400 mb-1">Сніданок</span>
            <input type="number" value={settings.breakfast}
              onChange={e => updateSetting('breakfast', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col text-sm">
            <span className="text-slate-400 mb-1">Обід</span>
            <input type="number" value={settings.lunch}
              onChange={e => updateSetting('lunch', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col text-sm">
            <span className="text-slate-400 mb-1">Вечеря</span>
            <input type="number" value={settings.dinner}
              onChange={e => updateSetting('dinner', parseFloat(e.target.value) || 0)} />
          </label>
        </div>
      </div>

      <button className="btn mb-6" onClick={addEntry}>+ Додати день</button>

      {/* Загальний підсумок */}
      {Object.keys(groups).length > 0 && (
        <div className="card mb-6" style={{background: 'linear-gradient(135deg, #1e293b, #0f172a)', border: '1px solid #f59e0b33'}}>
          <h2 className="text-lg font-semibold mb-3 text-amber-400">📊 Підсумок по всіх місяцях</h2>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr>
                  <th>Місяць</th>
                  <th className="text-right">Годин</th>
                  <th className="text-right">Брутто</th>
                  <th className="text-right">Їжа</th>
                  <th className="text-right">Кімната</th>
                  <th className="text-right">На руки</th>
                </tr>
              </thead>
              <tbody>
                {Object.keys(groups).sort().reverse().map(key => {
                  const m = calcMonth(groups[key]);
                  return (
                    <tr key={key}>
                      <td className="font-semibold">{monthName(key)}</td>
                      <td className="text-right">{m.hours}</td>
                      <td className="text-right">{m.gross.toFixed(2)} zł</td>
                      <td className="text-right text-red-400">−{m.meals.toFixed(2)}</td>
                      <td className="text-right text-red-400">−{settings.room.toFixed(2)}</td>
                      <td className="text-right font-bold text-amber-400">{m.net.toFixed(2)} zł</td>
                    </tr>
                  );
                })}
                {(() => {
                  const all = Object.values(groups).flat();
                  const totalHours = all.reduce((a,e) => a + Number(e.hours||0), 0);
                  const totalMeals = all.reduce((a,e) => a + (e.b?settings.breakfast:0) + (e.l?settings.lunch:0) + (e.d?settings.dinner:0), 0);
                  const monthCount = Object.keys(groups).length;
                  const totalRoom = settings.room * monthCount;
                  const totalGross = totalHours * settings.rate;
                  const totalNet = totalGross - totalMeals - totalRoom;
                  return (
                    <tr style={{borderTop: '2px solid #f59e0b'}}>
                      <td className="font-bold pt-3">РАЗОМ</td>
                      <td className="text-right font-bold pt-3">{totalHours}</td>
                      <td className="text-right font-bold pt-3">{totalGross.toFixed(2)} zł</td>
                      <td className="text-right font-bold text-red-400 pt-3">−{totalMeals.toFixed(2)}</td>
                      <td className="text-right font-bold text-red-400 pt-3">−{totalRoom.toFixed(2)}</td>
                      <td className="text-right font-bold text-amber-400 pt-3" style={{fontSize:'18px'}}>{totalNet.toFixed(2)} zł</td>
                    </tr>
                  );
                })()}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {Object.keys(groups).length === 0 && (
        <div className="card text-center text-slate-400">Ще немає записів. Натисни "Додати день".</div>
      )}

      {Object.keys(groups).sort().reverse().map(key => {
        const list = groups[key];
        const { hours, meals, gross, net } = calcMonth(list);
        return (
          <div key={key} className="card mb-6">
            <h2 className="text-xl font-bold mb-4 text-amber-400">{monthName(key)}</h2>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr>
                    <th>Дата</th>
                    <th>Години</th>
                    <th className="text-center">🍳</th>
                    <th className="text-center">🍲</th>
                    <th className="text-center">🍽</th>
                    <th className="text-center">📷</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {list.map(e => (
                    <tr key={e.id}>
                      <td><input type="date" value={e.date}
                        onChange={ev => updateEntry(e.id, 'date', ev.target.value)} /></td>
                      <td><input type="number" step="0.5" min="0" style={{width:'90px'}}
                        value={e.hours === 0 ? '' : e.hours}
                        placeholder="0"
                        onFocus={ev => ev.target.select()}
                        onChange={ev => updateEntry(e.id, 'hours', ev.target.value === '' ? 0 : parseFloat(ev.target.value) || 0)} /></td>
                      <td className="text-center"><input type="checkbox" className="chk" checked={!!e.b}
                        onChange={ev => updateEntry(e.id, 'b', ev.target.checked ? 1 : 0)} /></td>
                      <td className="text-center"><input type="checkbox" className="chk" checked={!!e.l}
                        onChange={ev => updateEntry(e.id, 'l', ev.target.checked ? 1 : 0)} /></td>
                      <td className="text-center"><input type="checkbox" className="chk" checked={!!e.d}
                        onChange={ev => updateEntry(e.id, 'd', ev.target.checked ? 1 : 0)} /></td>
                      <td className="text-center">
                        {e.img ? (
                          <div style={{display:'flex', gap:'4px', alignItems:'center', justifyContent:'center'}}>
                            <img
                              src={e.img}
                              className="photo-thumb"
                              onClick={() => setFullscreenImg(e.img)}
                              title="Натисни щоб переглянути"
                            />
                            <button
                              onClick={() => setPickerFor(e.id)}
                              style={{color:'#94a3b8', fontSize:'11px', cursor:'pointer'}}
                              title="Замінити фото"
                            >↺</button>
                            <button
                              onClick={() => removePhoto(e.id)}
                              style={{color:'#ef4444', fontSize:'11px', cursor:'pointer'}}
                              title="Видалити фото"
                            >✕</button>
                          </div>
                        ) : (
                          <button
                            className="photo-btn"
                            onClick={() => setPickerFor(e.id)}
                            title="Додати фото"
                          >📷</button>
                        )}
                      </td>
                      <td><button className="btn-red" onClick={() => deleteEntry(e.id)}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mt-5 pt-4 border-t border-slate-700">
              <div><div className="text-xs text-slate-400">Всього годин</div><div className="text-xl font-bold">{hours}</div></div>
              <div><div className="text-xs text-slate-400">Брутто (години)</div><div className="text-xl font-bold">{gross.toFixed(2)} zł</div></div>
              <div><div className="text-xs text-slate-400">Їжа</div><div className="text-xl font-bold text-red-400">−{meals.toFixed(2)} zł</div></div>
              <div><div className="text-xs text-slate-400">Кімната (раз/міс)</div><div className="text-xl font-bold text-red-400">−{settings.room.toFixed(2)} zł</div></div>
              <div><div className="text-xs text-slate-400">На руки</div><div className="text-2xl font-bold text-amber-400">{net.toFixed(2)} zł</div></div>
            </div>
          </div>
        );
      })}

      {/* Photo picker modal */}
      {pickerFor !== null && (
        <PhotoPicker
          recentPhotos={recentPhotos}
          onSelect={handlePhotoSelect}
          onClose={() => setPickerFor(null)}
        />
      )}

      {/* Fullscreen viewer */}
      {fullscreenImg && (
        <FullscreenPhoto src={fullscreenImg} onClose={() => setFullscreenImg(null)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
