<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Облік годин" />
<title>Облік годин</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #05070d;
    --bg-panel: rgba(12, 20, 34, 0.65);
    --bg-panel-2: rgba(17, 27, 44, 0.75);
    --cyan: #22d3ee;
    --cyan-glow: rgba(34, 211, 238, 0.55);
    --amber: #f59e0b;
    --amber-glow: rgba(245, 158, 11, 0.5);
    --pink: #f472b6;
    --text: #cbd5e1;
    --text-dim: #64748b;
    --border: rgba(34, 211, 238, 0.18);
    --border-strong: rgba(34, 211, 238, 0.45);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Rajdhani', system-ui, sans-serif;
    font-weight: 500;
    letter-spacing: 0.02em;
    position: relative;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(34, 211, 238, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34, 211, 238, 0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing radial blobs */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(600px circle at 15% 20%, rgba(34, 211, 238, 0.12), transparent 60%),
      radial-gradient(500px circle at 85% 80%, rgba(245, 158, 11, 0.10), transparent 60%),
      radial-gradient(400px circle at 50% 50%, rgba(244, 114, 182, 0.06), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  .hud { font-family: 'Orbitron', sans-serif; letter-spacing: 0.14em; text-transform: uppercase; }

  h1.title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 34px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #22d3ee 0%, #f59e0b 50%, #f472b6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px var(--cyan-glow);
    margin: 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  h1.title::before {
    content: '';
    display: inline-block;
    width: 8px; height: 32px;
    background: linear-gradient(180deg, var(--cyan), var(--amber));
    box-shadow: 0 0 20px var(--cyan-glow);
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    margin-top: 4px;
  }

  .card {
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 22px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(34, 211, 238, 0.04) inset,
      0 12px 40px rgba(0, 0, 0, 0.4);
  }
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px;
    width: 40px; height: 2px;
    background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan-glow);
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -1px; right: 20px;
    width: 40px; height: 2px;
    background: var(--amber);
    box-shadow: 0 0 12px var(--amber-glow);
  }

  .card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-strong), transparent);
  }

  input[type="number"], input[type="date"] {
    background: rgba(5, 10, 20, 0.7);
    border: 1px solid var(--border);
    color: #e0f7fa;
    border-radius: 3px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s ease;
  }
  input[type="number"]:focus, input[type="date"]:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.15), 0 0 16px var(--cyan-glow);
    background: rgba(5, 10, 20, 0.9);
  }

  .field-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .chk {
    appearance: none;
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border: 1.5px solid var(--border-strong);
    border-radius: 3px;
    background: rgba(5, 10, 20, 0.6);
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
  }
  .chk:hover { border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); }
  .chk:checked {
    background: var(--cyan);
    border-color: var(--cyan);
    box-shadow: 0 0 12px var(--cyan-glow);
  }
  .chk:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg-deep);
    font-weight: 900;
    font-size: 14px;
  }

  th {
    background: transparent;
    font-family: 'Orbitron', sans-serif;
    font-weight: 600;
    padding: 12px 8px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cyan);
    border-bottom: 1px solid var(--border-strong);
  }
  td {
    padding: 10px 8px;
    border-bottom: 1px solid rgba(34, 211, 238, 0.08);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  tr { transition: background 0.15s ease; }
  tr:hover td { background: rgba(34, 211, 238, 0.04); }

  .btn {
    background: linear-gradient(135deg, #06b6d4, #22d3ee);
    color: #031019;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 3px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-size: 12px;
    border: 1px solid var(--cyan);
    cursor: pointer;
    box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.3), 0 0 20px rgba(34, 211, 238, 0.25);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .btn:hover {
    box-shadow: 0 0 0 1px var(--cyan), 0 0 28px var(--cyan-glow);
    transform: translateY(-1px);
  }
  .btn-ghost {
    background: transparent;
    color: var(--cyan);
    border: 1px solid var(--border-strong);
    box-shadow: none;
  }
  .btn-ghost:hover {
    background: rgba(34, 211, 238, 0.08);
    border-color: var(--cyan);
    box-shadow: 0 0 16px var(--cyan-glow);
  }
  .btn-amber {
    background: linear-gradient(135deg, #d97706, #f59e0b);
    border-color: var(--amber);
    box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.3), 0 0 20px rgba(245, 158, 11, 0.25);
    color: #1a0f00;
  }
  .btn-amber:hover {
    box-shadow: 0 0 0 1px var(--amber), 0 0 28px var(--amber-glow);
  }
  .btn-red {
    background: rgba(220, 38, 38, 0.15);
    color: #fca5a5;
    border: 1px solid rgba(220, 38, 38, 0.4);
    padding: 4px 10px;
    border-radius: 3px;
    font-size: 12px;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-red:hover {
    background: rgba(220, 38, 38, 0.3);
    border-color: #ef4444;
    color: #fff;
    box-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
  }

  .photo-thumb {
    width: 46px; height: 46px; object-fit: cover;
    border-radius: 4px;
    cursor: pointer;
    border: 1.5px solid var(--amber);
    box-shadow: 0 0 12px var(--amber-glow);
    display: block;
    transition: all 0.2s ease;
  }
  .photo-thumb:hover { transform: scale(1.08); box-shadow: 0 0 20px var(--amber-glow); }

  .photo-btn {
    width: 46px; height: 46px;
    background: rgba(5, 10, 20, 0.6);
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    border: 1.5px dashed var(--border-strong);
    transition: all 0.2s ease;
  }
  .photo-btn:hover {
    border-color: var(--cyan);
    border-style: solid;
    background: rgba(34, 211, 238, 0.08);
    box-shadow: 0 0 16px var(--cyan-glow);
  }

  .picker-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex; align-items: flex-end;
  }
  .picker-sheet {
    background: linear-gradient(180deg, rgba(17, 27, 44, 0.98), rgba(5, 7, 13, 0.98));
    border-top: 1px solid var(--cyan);
    box-shadow: 0 -20px 60px rgba(34, 211, 238, 0.2);
    border-radius: 12px 12px 0 0;
    padding: 24px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .recent-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .recent-img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid var(--border);
    transition: all 0.2s ease;
  }
  .recent-img:hover {
    border-color: var(--cyan);
    box-shadow: 0 0 16px var(--cyan-glow);
    transform: scale(1.03);
  }
  .fullscreen-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.97);
    backdrop-filter: blur(12px);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }

  /* Stats block */
  .stat-block {
    background: rgba(5, 10, 20, 0.5);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    position: relative;
  }
  .stat-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #e0f7fa;
  }
  .stat-value.accent { color: var(--amber); text-shadow: 0 0 12px var(--amber-glow); }
  .stat-value.danger { color: #f87171; }
  .stat-value.big { font-size: 26px; }

  .month-header {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber);
    text-shadow: 0 0 20px var(--amber-glow);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .month-header::before {
    content: '▸';
    color: var(--cyan);
  }

  .summary-card {
    background:
      linear-gradient(135deg, rgba(17, 27, 44, 0.85), rgba(5, 7, 13, 0.95)) !important;
    border: 1px solid var(--border-strong) !important;
  }
  .summary-card::before {
    background: var(--amber) !important;
    box-shadow: 0 0 16px var(--amber-glow) !important;
  }

  .total-row td {
    border-top: 1px solid var(--amber);
    padding-top: 14px !important;
    font-weight: 700;
    color: #e0f7fa;
  }
  .total-row td:last-child {
    color: var(--amber);
    text-shadow: 0 0 12px var(--amber-glow);
    font-size: 18px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
  }
  .empty-state::before {
    content: '[ NO DATA ]';
    display: block;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    color: var(--cyan);
    letter-spacing: 0.3em;
    margin-bottom: 12px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

  /* Corner brackets decoration */
  .bracket-tl::before, .bracket-tr::after,
  .bracket-bl::before, .bracket-br::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border: 1.5px solid var(--cyan);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const STORAGE_KEY = 'hours_tracker_v1';
const defaultSettings = {
  rate: 28.1,
  room: 200,
  breakfast: 7,
  lunch: 13,
  dinner: 10,
};

function load() {
  try {
    if (typeof localStorage !== 'undefined') {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        return {
          entries: parsed.entries || [],
          settings: { ...defaultSettings, ...(parsed.settings || {}) },
          recentPhotos: parsed.recentPhotos || [],
        };
      }
    }
  } catch(e) {}
  return { entries: [], settings: defaultSettings, recentPhotos: [] };
}

function save(state) {
  try {
    if (typeof localStorage !== 'undefined') {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
  } catch(e) {
    alert('Помилка збереження. Можливо, забагато фотографій в пам\'яті.');
  }
}

// Compress image to JPEG base64, max 700px, quality 0.75
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 700;
        let w = img.width, h = img.height;
        if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Photo picker sheet
function PhotoPicker({ onSelect, onClose, recentPhotos }) {
  const fileRef = useRef();

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const compressed = await compressImage(file);
    onSelect(compressed);
  };

  return (
    <div className="picker-overlay" onClick={onClose}>
      <div className="picker-sheet" onClick={e => e.stopPropagation()}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
          <span className="hud" style={{fontSize:'14px', color:'var(--cyan)'}}>◆ ФОТО · ДЕНЬ</span>
          <button onClick={onClose} style={{color:'var(--text-dim)', fontSize:'22px', lineHeight:1, background:'transparent', border:'none', cursor:'pointer'}}>✕</button>
        </div>

        <button className="btn" style={{width:'100%', marginBottom:'20px', padding:'14px'}}
          onClick={() => fileRef.current.click()}>
          ▸ Вибрати нову фотографію
        </button>
        <input
          ref={fileRef}
          type="file"
          accept="image/*"
          capture="environment"
          style={{display:'none'}}
          onChange={handleFile}
        />

        {recentPhotos.length > 0 && (
          <>
            <div className="hud" style={{fontSize:'10px', color:'var(--text-dim)', marginBottom:'12px'}}>
              ▸ Останні {recentPhotos.length} · обрати
            </div>
            <div className="recent-grid">
              {recentPhotos.map((src, i) => (
                <img
                  key={i}
                  src={src}
                  className="recent-img"
                  onClick={() => onSelect(src)}
                />
              ))}
            </div>
          </>
        )}
        <div style={{height:'20px'}} />
      </div>
    </div>
  );
}

// Fullscreen image viewer
function FullscreenPhoto({ src, onClose }) {
  return (
    <div className="fullscreen-overlay" onClick={onClose}>
      <img src={src} style={{maxWidth:'95vw', maxHeight:'90vh', borderRadius:'8px', objectFit:'contain'}} />
      <div style={{color:'#94a3b8', marginTop:'16px', fontSize:'14px'}}>Натисни щоб закрити</div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(load);
  const { entries, settings, recentPhotos } = state;
  const [pickerFor, setPickerFor] = useState(null); // entry id
  const [fullscreenImg, setFullscreenImg] = useState(null);

  useEffect(() => { save(state); }, [state]);

  const addEntry = () => {
    const today = new Date().toISOString().slice(0, 10);
    setState(s => ({
      ...s,
      entries: [...s.entries, { id: Date.now(), date: today, hours: 0, b: 0, l: 0, d: 0, img: null }]
    }));
  };

  const updateEntry = (id, field, value) => {
    setState(s => ({
      ...s,
      entries: s.entries.map(e => e.id === id ? { ...e, [field]: value } : e)
    }));
  };

  const deleteEntry = (id) => {
    setState(s => ({ ...s, entries: s.entries.filter(e => e.id !== id) }));
  };

  const updateSetting = (field, value) => {
    setState(s => ({ ...s, settings: { ...s.settings, [field]: value } }));
  };

  const handlePhotoSelect = useCallback((base64) => {
    if (!pickerFor) return;
    setState(s => {
      // Add to recent (no duplicates, max 10)
      const without = s.recentPhotos.filter(p => p !== base64);
      const newRecent = [base64, ...without].slice(0, 10);
      return {
        ...s,
        recentPhotos: newRecent,
        entries: s.entries.map(e => e.id === pickerFor ? { ...e, img: base64 } : e),
      };
    });
    setPickerFor(null);
  }, [pickerFor]);

  const removePhoto = (id) => {
    setState(s => ({
      ...s,
      entries: s.entries.map(e => e.id === id ? { ...e, img: null } : e),
    }));
  };

  const exportData = () => {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `hours-tracker-${today}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importFileRef = useRef();
  const handleImportFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.entries || !Array.isArray(parsed.entries)) {
          alert('Невірний формат файлу.');
          return;
        }
        const mode = confirm(
          `Знайдено ${parsed.entries.length} записів.\n\n` +
          'OK — ЗАМІНИТИ всі поточні дані\n' +
          'Cancel — ОБ\'ЄДНАТИ з поточними (додати нові записи)'
        );
        setState(s => {
          if (mode) {
            return {
              entries: parsed.entries,
              settings: { ...defaultSettings, ...(parsed.settings || s.settings) },
              recentPhotos: parsed.recentPhotos || [],
            };
          } else {
            const existingIds = new Set(s.entries.map(e => e.id));
            const newOnes = parsed.entries.filter(e => !existingIds.has(e.id));
            const mergedPhotos = [...(parsed.recentPhotos || []), ...s.recentPhotos]
              .filter((v, i, a) => a.indexOf(v) === i)
              .slice(0, 10);
            return {
              entries: [...s.entries, ...newOnes],
              settings: s.settings,
              recentPhotos: mergedPhotos,
            };
          }
        });
        alert('Готово!');
      } catch (err) {
        alert('Помилка читання файлу: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Group by month
  const groups = useMemo(() => {
    const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
    const g = {};
    sorted.forEach(e => {
      const key = e.date.slice(0, 7);
      if (!g[key]) g[key] = [];
      g[key].push(e);
    });
    return g;
  }, [entries]);

  const calcMonth = (list) => {
    const hours = list.reduce((a, e) => a + Number(e.hours || 0), 0);
    const meals = list.reduce((a, e) =>
      a + (e.b ? settings.breakfast : 0) + (e.l ? settings.lunch : 0) + (e.d ? settings.dinner : 0), 0);
    const gross = hours * settings.rate;
    const net = gross - settings.room - meals;
    return { hours, meals, gross, net };
  };

  const monthName = (key) => {
    const [y, m] = key.split('-');
    const names = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
    return `${names[parseInt(m)-1]} ${y}`;
  };

  return (
    <div className="max-w-6xl mx-auto p-4 md:p-8">
      <div className="mb-8">
        <h1 className="title">HOURS · TRACKER</h1>
        <div className="subtitle">SYS.v1 // WORK MONITORING INTERFACE</div>
      </div>

      {/* Settings */}
      <div className="card mb-6">
        <div className="card-title">⚙ Конфігурація</div>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
          <label className="flex flex-col">
            <span className="field-label">Ставка zł/год</span>
            <input type="number" step="0.01" value={settings.rate}
              onChange={e => updateSetting('rate', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col">
            <span className="field-label">Кімната</span>
            <input type="number" value={settings.room}
              onChange={e => updateSetting('room', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col">
            <span className="field-label">Сніданок</span>
            <input type="number" value={settings.breakfast}
              onChange={e => updateSetting('breakfast', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col">
            <span className="field-label">Обід</span>
            <input type="number" value={settings.lunch}
              onChange={e => updateSetting('lunch', parseFloat(e.target.value) || 0)} />
          </label>
          <label className="flex flex-col">
            <span className="field-label">Вечеря</span>
            <input type="number" value={settings.dinner}
              onChange={e => updateSetting('dinner', parseFloat(e.target.value) || 0)} />
          </label>
        </div>
      </div>

      <div className="flex flex-wrap gap-3 mb-6">
        <button className="btn btn-amber" onClick={addEntry}>▸ Новий день</button>
        <button className="btn btn-ghost" onClick={exportData}>⬇ Експорт</button>
        <button className="btn btn-ghost" onClick={() => importFileRef.current.click()}>⬆ Імпорт</button>
        <input
          ref={importFileRef}
          type="file"
          accept="application/json,.json"
          style={{display:'none'}}
          onChange={handleImportFile}
        />
      </div>

      {/* Загальний підсумок */}
      {Object.keys(groups).length > 0 && (
        <div className="card summary-card mb-6">
          <div className="card-title" style={{color:'var(--amber)'}}>◆ Глобальна статистика</div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr>
                  <th>Місяць</th>
                  <th className="text-right">Годин</th>
                  <th className="text-right">Брутто</th>
                  <th className="text-right">Їжа</th>
                  <th className="text-right">Кімната</th>
                  <th className="text-right">На руки</th>
                </tr>
              </thead>
              <tbody>
                {Object.keys(groups).sort().reverse().map(key => {
                  const m = calcMonth(groups[key]);
                  return (
                    <tr key={key}>
                      <td className="font-semibold">{monthName(key)}</td>
                      <td className="text-right">{m.hours}</td>
                      <td className="text-right">{m.gross.toFixed(2)} zł</td>
                      <td className="text-right text-red-400">−{m.meals.toFixed(2)}</td>
                      <td className="text-right text-red-400">−{settings.room.toFixed(2)}</td>
                      <td className="text-right font-bold text-amber-400">{m.net.toFixed(2)} zł</td>
                    </tr>
                  );
                })}
                {(() => {
                  const all = Object.values(groups).flat();
                  const totalHours = all.reduce((a,e) => a + Number(e.hours||0), 0);
                  const totalMeals = all.reduce((a,e) => a + (e.b?settings.breakfast:0) + (e.l?settings.lunch:0) + (e.d?settings.dinner:0), 0);
                  const monthCount = Object.keys(groups).length;
                  const totalRoom = settings.room * monthCount;
                  const totalGross = totalHours * settings.rate;
                  const totalNet = totalGross - totalMeals - totalRoom;
                  return (
                    <tr className="total-row">
                      <td className="hud">Σ TOTAL</td>
                      <td className="text-right">{totalHours}</td>
                      <td className="text-right">{totalGross.toFixed(2)} zł</td>
                      <td className="text-right" style={{color:'#f87171'}}>−{totalMeals.toFixed(2)}</td>
                      <td className="text-right" style={{color:'#f87171'}}>−{totalRoom.toFixed(2)}</td>
                      <td className="text-right">{totalNet.toFixed(2)} zł</td>
                    </tr>
                  );
                })()}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {Object.keys(groups).length === 0 && (
        <div className="card">
          <div className="empty-state">Натисни «Новий день» щоб ініціалізувати запис</div>
        </div>
      )}

      {Object.keys(groups).sort().reverse().map(key => {
        const list = groups[key];
        const { hours, meals, gross, net } = calcMonth(list);
        return (
          <div key={key} className="card mb-6">
            <div className="month-header">{monthName(key)}</div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr>
                    <th>Дата</th>
                    <th>Години</th>
                    <th className="text-center">🍳</th>
                    <th className="text-center">🍲</th>
                    <th className="text-center">🍽</th>
                    <th className="text-center">📷</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {list.map(e => (
                    <tr key={e.id}>
                      <td><input type="date" value={e.date}
                        onChange={ev => updateEntry(e.id, 'date', ev.target.value)} /></td>
                      <td><input type="number" step="0.5" min="0" style={{width:'90px'}}
                        value={e.hours === 0 ? '' : e.hours}
                        placeholder="0"
                        onFocus={ev => ev.target.select()}
                        onChange={ev => updateEntry(e.id, 'hours', ev.target.value === '' ? 0 : parseFloat(ev.target.value) || 0)} /></td>
                      <td className="text-center"><input type="checkbox" className="chk" checked={!!e.b}
                        onChange={ev => updateEntry(e.id, 'b', ev.target.checked ? 1 : 0)} /></td>
                      <td className="text-center"><input type="checkbox" className="chk" checked={!!e.l}
                        onChange={ev => updateEntry(e.id, 'l', ev.target.checked ? 1 : 0)} /></td>
                      <td className="text-center"><input type="checkbox" className="chk" checked={!!e.d}
                        onChange={ev => updateEntry(e.id, 'd', ev.target.checked ? 1 : 0)} /></td>
                      <td className="text-center">
                        {e.img ? (
                          <div style={{display:'flex', gap:'4px', alignItems:'center', justifyContent:'center'}}>
                            <img
                              src={e.img}
                              className="photo-thumb"
                              onClick={() => setFullscreenImg(e.img)}
                              title="Натисни щоб переглянути"
                            />
                            <button
                              onClick={() => setPickerFor(e.id)}
                              style={{color:'#94a3b8', fontSize:'11px', cursor:'pointer'}}
                              title="Замінити фото"
                            >↺</button>
                            <button
                              onClick={() => removePhoto(e.id)}
                              style={{color:'#ef4444', fontSize:'11px', cursor:'pointer'}}
                              title="Видалити фото"
                            >✕</button>
                          </div>
                        ) : (
                          <button
                            className="photo-btn"
                            onClick={() => setPickerFor(e.id)}
                            title="Додати фото"
                          >📷</button>
                        )}
                      </td>
                      <td><button className="btn-red" onClick={() => deleteEntry(e.id)}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mt-5">
              <div className="stat-block">
                <div className="stat-label">Годин</div>
                <div className="stat-value">{hours}</div>
              </div>
              <div className="stat-block">
                <div className="stat-label">Брутто</div>
                <div className="stat-value">{gross.toFixed(2)} zł</div>
              </div>
              <div className="stat-block">
                <div className="stat-label">Їжа</div>
                <div className="stat-value danger">−{meals.toFixed(2)}</div>
              </div>
              <div className="stat-block">
                <div className="stat-label">Кімната</div>
                <div className="stat-value danger">−{settings.room.toFixed(2)}</div>
              </div>
              <div className="stat-block">
                <div className="stat-label">Net · На руки</div>
                <div className="stat-value accent big">{net.toFixed(2)} zł</div>
              </div>
            </div>
          </div>
        );
      })}

      {/* Photo picker modal */}
      {pickerFor !== null && (
        <PhotoPicker
          recentPhotos={recentPhotos}
          onSelect={handlePhotoSelect}
          onClose={() => setPickerFor(null)}
        />
      )}

      {/* Fullscreen viewer */}
      {fullscreenImg && (
        <FullscreenPhoto src={fullscreenImg} onClose={() => setFullscreenImg(null)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
